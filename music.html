<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Music — Lila Nazemian</title>
  <link rel="icon" type="image/png" sizes="32x32" href="assets/favicon-32.png" />
  <link rel="apple-touch-icon" href="assets/apple-touch-icon.png" />
  <meta property="og:title"       content="Lila &amp; Salar — Lila Nazemian" />
  <meta property="og:description" content="Music by Lila Nazemian and Salar Ansari." />
  <meta property="og:image"       content="https://lilanazemian.com/assets/og-image.png" />
  <meta property="og:type"        content="website" />
  <meta name="twitter:card"       content="summary_large_image" />
  <meta name="twitter:image"      content="https://lilanazemian.com/assets/og-image.png" />
  <link rel="stylesheet" href="assets/style.css" />
  <style>
    body { background: #1a1814; }

    /* Nav adapts on music page */
    .site-nav {
      background: rgba(26,24,20,0.75);
      border-bottom-color: rgba(189,191,169,0.12);
    }
    .nav-logo a { color: var(--greige); }

    /* Drawer on dark background */
    .drawer {
      background: #1a1814;
      border-left-color: rgba(189,191,169,0.12);
    }
    .drawer nav a { color: var(--greige); border-bottom-color: rgba(189,191,169,0.12); }
    .drawer nav a:hover { color: var(--sage); }
    .drawer nav a.active { color: var(--lilac); }

    /* Floating menu button — top-right */
    .menu-btn {
      position: fixed !important;
      top: 24px;
      right: 24px;
      z-index: 1000;
      background: none !important;
      border: none !important;
      box-shadow: none !important;
      cursor: grab;
      padding: 0;
    }
    .btn-float { animation: btnBob 4s ease-in-out infinite; }
    .btn-float svg { display: block; filter: drop-shadow(0 6px 18px rgba(0,0,0,0.5)); }
    @keyframes btnBob {
      0%, 100% { transform: translateY(0px); }
      50%       { transform: translateY(-10px); }
    }

    /* Drawer: dropdown below top-right button */
    .drawer {
      top: 140px !important;
      right: 16px !important;
      left: auto !important;
      height: fit-content !important;
      width: fit-content !important;
      min-width: 160px !important;
      padding: 22px 44px 26px 32px !important;
      border-left: none !important;
      border: 0.5px solid rgba(189,191,169,0.18) !important;
      border-radius: 6px !important;
      transform: translateY(-10px) !important;
      opacity: 0;
      pointer-events: none;
      transition: transform 0.28s cubic-bezier(0.34,1.18,0.64,1),
                  opacity 0.2s ease !important;
    }
    .drawer.open {
      transform: translateY(0) !important;
      opacity: 1 !important;
      pointer-events: auto !important;
    }

    /* Full-bleed video hero */
    .music-hero {
      position: relative;
      width: 100%;
      height: 100vh;
      overflow: hidden;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .music-hero video {
      position: absolute;
      inset: 0;
      width: 100%;
      height: 100%;
      object-fit: cover;
      opacity: 0.55;
    }
    .music-hero-overlay {
      position: absolute;
      inset: 0;
      background: linear-gradient(to bottom, rgba(26,24,20,0.3) 0%, rgba(26,24,20,0.55) 100%);
    }
    .music-content {
      position: relative;
      z-index: 2;
      text-align: center;
      padding: 0 40px;
      max-width: 600px;
    }
    .music-eyebrow {
      font-size: 10px;
      letter-spacing: 0.2em;
      text-transform: uppercase;
      color: var(--olive);
      margin-bottom: 20px;
    }
    .music-title {
      font-family: var(--serif);
      font-size: clamp(36px, 6vw, 64px);
      font-weight: 400;
      color: var(--greige);
      line-height: 1.05;
      margin-bottom: 28px;
    }
    .music-title em {
      font-style: italic;
      color: var(--lilac);
    }
    .music-body {
      font-size: 15px;
      font-weight: 300;
      color: rgba(189,191,169,0.85);
      line-height: 1.85;
    }
    .music-body a.bio-link {
      color: var(--sage);
      border-bottom-color: rgba(160,192,95,0.4);
    }
    .music-body a.bio-link:hover {
      color: var(--greige);
      border-bottom-color: var(--greige);
    }

    .site-footer {
      background: #1a1814;
      color: rgba(189,191,169,0.35);
      border-top-color: rgba(189,191,169,0.1);
      margin-top: 0;
    }
  </style>
</head>

  <!-- Isfahan music box — melody variation, link tinkle, mute -->
  <script>
  (function () {
    var AC = window.AudioContext || window.webkitAudioContext;
    if (!AC) return;

    var D4  = 587.33, E4 = 659.26,
        Fk4 = D4 * Math.pow(2, 350 / 1200),
        G4  = 784.00, A4 = 880.00, Bb4 = 932.33;

    var tempo = 0.88 + Math.random() * 0.24;
    function ms(x) { return x * tempo; }

    var mel1 = [
      {f:A4,d:ms(560)},{f:G4,d:ms(390)},{f:Fk4,d:ms(760)},
      {f:E4,d:ms(390)},{f:D4,d:ms(1200)},{f:0,d:ms(420)},
      {f:D4,d:ms(280)},{f:E4,d:ms(280)},{f:Fk4,d:ms(430)},
      {f:G4,d:ms(560)},{f:A4,d:ms(390)},{f:Bb4,d:ms(610)},
      {f:A4,d:ms(390)},{f:G4,d:ms(390)},{f:Fk4,d:ms(560)},
      {f:E4,d:ms(390)},{f:D4,d:ms(1500)},{f:0,d:ms(500)},
      {f:E4,d:ms(200)},{f:Fk4,d:ms(250)},{f:E4,d:ms(200)},
      {f:D4,d:ms(250)},{f:E4,d:ms(200)},{f:Fk4,d:ms(610)},
      {f:G4,d:ms(760)},{f:Fk4,d:ms(430)},{f:E4,d:ms(390)},
      {f:D4,d:ms(2000)},{f:0,d:ms(1200)}
    ];
    var mel2 = [
      {f:D4,d:ms(560)},{f:E4,d:ms(390)},{f:Fk4,d:ms(760)},
      {f:G4,d:ms(390)},{f:A4,d:ms(1200)},{f:0,d:ms(420)},
      {f:A4,d:ms(280)},{f:G4,d:ms(280)},{f:Fk4,d:ms(430)},
      {f:E4,d:ms(560)},{f:D4,d:ms(390)},{f:E4,d:ms(610)},
      {f:Fk4,d:ms(390)},{f:E4,d:ms(390)},{f:D4,d:ms(560)},{f:0,d:ms(500)},
      {f:G4,d:ms(200)},{f:Fk4,d:ms(250)},{f:G4,d:ms(200)},
      {f:A4,d:ms(250)},{f:G4,d:ms(200)},{f:Fk4,d:ms(610)},
      {f:E4,d:ms(760)},{f:D4,d:ms(2000)},{f:0,d:ms(1200)}
    ];
    var mel3 = [
      {f:Bb4,d:ms(760)},{f:A4,d:ms(560)},
      {f:G4,d:ms(390)},{f:Fk4,d:ms(760)},
      {f:E4,d:ms(390)},{f:D4,d:ms(1500)},{f:0,d:ms(500)},
      {f:D4,d:ms(280)},{f:Fk4,d:ms(430)},{f:A4,d:ms(560)},
      {f:Bb4,d:ms(610)},{f:A4,d:ms(390)},{f:G4,d:ms(390)},
      {f:Fk4,d:ms(560)},{f:E4,d:ms(390)},{f:D4,d:ms(1200)},{f:0,d:ms(420)},
      {f:E4,d:ms(200)},{f:Fk4,d:ms(200)},{f:E4,d:ms(200)},
      {f:D4,d:ms(200)},{f:E4,d:ms(430)},
      {f:Fk4,d:ms(390)},{f:G4,d:ms(560)},{f:Fk4,d:ms(430)},
      {f:E4,d:ms(390)},{f:D4,d:ms(2200)},{f:0,d:ms(1200)}
    ];
    var mel = [mel1, mel2, mel3][Math.floor(Math.random() * 3)];

    var PARTIALS = [
      [1.000, 1.00, 2.4],
      [2.756, 0.32, 0.50],
      [5.404, 0.10, 0.18],
    ];

    var ctx, masterGain, nextTime = 0, idx = 0, ready = false;
    var _muted = localStorage.getItem('siteMuted') === 'true';

    (function () {
      var btn = document.getElementById('mute-btn');
      if (btn && _muted) btn.classList.add('muted');
    }());

    function makeReverb() {
      var conv = ctx.createConvolver(), n = ctx.sampleRate * 3,
          buf  = ctx.createBuffer(2, n, ctx.sampleRate);
      for (var c = 0; c < 2; c++) {
        var d = buf.getChannelData(c);
        for (var i = 0; i < n; i++)
          d[i] = (Math.random() * 2 - 1) * Math.pow(1 - i / n, 2.1);
      }
      conv.buffer = buf; return conv;
    }

    function makeHallReverb() {
      var conv = ctx.createConvolver(), n = ctx.sampleRate * 5,
          buf  = ctx.createBuffer(2, n, ctx.sampleRate);
      var pre = Math.floor(ctx.sampleRate * 0.022);
      for (var c = 0; c < 2; c++) {
        var d = buf.getChannelData(c);
        for (var i = 0; i < n; i++) {
          if (i < pre) { d[i] = 0; continue; }
          var tt = (i - pre) / (n - pre);
          d[i] = (Math.random() * 2 - 1) * Math.pow(1 - tt, 1.2);
        }
      }
      conv.buffer = buf; return conv;
    }

    function strikeTine(freq, startTime) {
      PARTIALS.forEach(function(p) {
        var osc = ctx.createOscillator(), ng = ctx.createGain();
        osc.type = 'sine'; osc.frequency.value = freq * p[0];
        ng.gain.setValueAtTime(0, startTime);
        ng.gain.linearRampToValueAtTime(p[1], startTime + 0.003);
        ng.gain.exponentialRampToValueAtTime(0.0001, startTime + p[2]);
        osc.connect(ng); ng.connect(masterGain);
        osc.start(startTime); osc.stop(startTime + p[2] + 0.05);
      });
    }

    function tick() {
      while (nextTime < ctx.currentTime + 2.0) {
        var note = mel[idx], dur = note.d / 1000;
        if (note.f > 0) strikeTine(note.f, nextTime);
        nextTime += dur;
        idx = (idx + 1) % mel.length;
        if (idx === 0) nextTime += 2.5;
      }
      setTimeout(tick, 80);
    }

    function startWind() {
      var len = ctx.sampleRate * 8, buf = ctx.createBuffer(2, len, ctx.sampleRate);
      for (var c = 0; c < 2; c++) {
        var d = buf.getChannelData(c);
        for (var i = 0; i < len; i++) d[i] = Math.random() * 2 - 1;
      }
      var noise = ctx.createBufferSource();
      noise.buffer = buf; noise.loop = true;
      var hp = ctx.createBiquadFilter();
      hp.type = 'highpass'; hp.frequency.value = 80; hp.Q.value = 0.4;
      var lp = ctx.createBiquadFilter();
      lp.type = 'lowpass'; lp.frequency.value = 650; lp.Q.value = 0.5;
      var wGain = ctx.createGain();
      wGain.gain.setValueAtTime(0, ctx.currentTime);
      wGain.gain.linearRampToValueAtTime(0.07, ctx.currentTime + 2.5);
      var aLFO = ctx.createOscillator(), aLFOG = ctx.createGain();
      aLFO.frequency.value = 0.05; aLFOG.gain.value = 0.018;
      aLFO.connect(aLFOG); aLFOG.connect(wGain.gain); aLFO.start();
      var fLFO = ctx.createOscillator(), fLFOG = ctx.createGain();
      fLFO.frequency.value = 0.024; fLFOG.gain.value = 180;
      fLFO.connect(fLFOG); fLFOG.connect(lp.frequency); fLFO.start();
      var wRevConv = makeReverb(), wRevG = ctx.createGain();
      wRevG.gain.value = 0.85;
      noise.connect(hp); hp.connect(lp); lp.connect(wGain);
      wGain.connect(ctx.destination);
      wGain.connect(wRevConv); wRevConv.connect(wRevG); wRevG.connect(ctx.destination);
      noise.start();
    }

    var tinkleBusy = false;
    function tinkle() {
      if (!ready || !ctx || _muted || tinkleBusy) return;
      tinkleBusy = true;
      setTimeout(function() { tinkleBusy = false; }, 120);
      var TNOTES = [D4*4, E4*4, Fk4*4, G4*4, A4*4];
      var f = TNOTES[Math.floor(Math.random() * TNOTES.length)]
              * Math.pow(2, (Math.random() * 14 - 7) / 1200);
      [[1.0, 0.08, 0.36], [2.756, 0.025, 0.12]].forEach(function(p) {
        var osc = ctx.createOscillator(), g = ctx.createGain();
        osc.type = 'sine'; osc.frequency.value = f * p[0];
        g.gain.setValueAtTime(0, ctx.currentTime);
        g.gain.linearRampToValueAtTime(p[1], ctx.currentTime + 0.003);
        g.gain.exponentialRampToValueAtTime(0.0001, ctx.currentTime + p[2]);
        osc.connect(g); g.connect(ctx.destination);
        osc.start(); osc.stop(ctx.currentTime + p[2] + 0.05);
      });
    }

    function setup() {
      if (ready) return;
      ready = true;
      var rev = makeHallReverb(), rvg = ctx.createGain();
      rvg.gain.value = 0.54;
      masterGain = ctx.createGain();
      masterGain.gain.setValueAtTime(0, ctx.currentTime);
      masterGain.gain.linearRampToValueAtTime(0.36, ctx.currentTime + 0.8);
      masterGain.connect(ctx.destination);
      masterGain.connect(rev); rev.connect(rvg); rvg.connect(ctx.destination);
      nextTime = ctx.currentTime + 0.5;
      tick();
      startWind();
      document.querySelectorAll('a').forEach(function(a) {
        a.addEventListener('mouseenter', tinkle);
      });
    }

    function start() {
      if (_muted) return;
      if (!ctx) ctx = new AC();
      ctx.resume().then(function() { if (ctx.state === 'running') setup(); });
    }

    window._toggleSiteMusic = function() {
      _muted = !_muted;
      localStorage.setItem('siteMuted', _muted ? 'true' : 'false');
      var btn = document.getElementById('mute-btn');
      if (btn) btn.classList.toggle('muted', _muted);
      if (_muted) {
        if (ctx) ctx.suspend();
      } else {
        if (!ctx || ctx.state === 'suspended') start();
        else if (ctx) ctx.resume();
      }
    };

    if (!_muted) {
      start();
      ['click','touchstart','keydown'].forEach(function(ev) {
        document.addEventListener(ev, start, { once: true, passive: true });
      });
    }
  }());
  </script>

  <!-- Cosmos snow -->
  <script>
  (function () {
    var COLORS = ['#d8b0d5','#c090c4','#e0c8de','#b860b0','#f0dcea','#bdbfa9','#cda8ca'];
    var N = 24;
    var wrap = document.createElement('div');
    wrap.style.cssText = 'position:fixed;inset:0;pointer-events:none;z-index:10;overflow:hidden;';
    document.body.appendChild(wrap);

    function flowerSVG(sz, fill) {
      var p8  = [0,45,90,135,180,225,270,315];
      var p16 = [22.5,67.5,112.5,157.5,202.5,247.5,292.5,337.5];
      var s = '<svg viewBox="-24 -24 48 48" width="'+sz+'" height="'+sz+'" xmlns="http://www.w3.org/2000/svg">';
      p8.forEach(function(r){ s += '<path d="M0,0 C-4.5,-7 -4.5,-16 0,-21 C4.5,-16 4.5,-7 0,0Z" fill="'+fill+'" transform="rotate('+r+')"/>'; });
      p16.forEach(function(r){ s += '<path d="M0,0 C-3,-5 -3,-11 0,-14 C3,-11 3,-5 0,0Z" fill="'+fill+'" opacity="0.72" transform="rotate('+r+')"/>'; });
      s += '<circle r="5" fill="#f5d060" opacity="0.85"/></svg>';
      return s;
    }

    for (var i = 0; i < N; i++) spawn();

    function spawn() {
      var size  = 22 + Math.random() * 32;
      var x     = Math.random() * 106 - 3;
      var dur   = 50000 + Math.random() * 45000;
      var delay = -(0.12 + Math.random() * 0.88) * dur;
      var fill  = COLORS[Math.floor(Math.random() * COLORS.length)];
      var drift = (Math.random() - 0.5) * 180;
      var spin  = (Math.random() - 0.5) * 600;
      var opk   = 0.55 + Math.random() * 0.3;
      var el = document.createElement('div');
      el.style.cssText = 'position:absolute;top:0;left:' + x + '%;';
      el.innerHTML = flowerSVG(Math.round(size), fill);
      wrap.appendChild(el);
      el.animate([
        { transform: 'translateY(-'+(size+10)+'px) translateX(0px) rotate(0deg)',     opacity: opk },
        { transform: 'translateY(110vh) translateX('+drift+'px) rotate('+spin+'deg)', opacity: 0   }
      ], { duration: dur, delay: delay, iterations: Infinity, easing: 'linear' });
    }
  }());
  </script>

  <!-- Spin animation + drawer -->
  <script>
    var _baseRate = Math.random() < 0.5 ? 1 : -1;
    var _spinAnim;
    (function () {
      var svg = document.querySelector('.menu-btn .btn-float svg');
      if (!svg) return;
      _spinAnim = svg.animate(
        [{ transform: 'rotate(0deg)' }, { transform: 'rotate(360deg)' }],
        { duration: 11000, iterations: Infinity, easing: 'linear' }
      );
      _spinAnim.playbackRate = _baseRate;
    }());

    function _spinBtn() {
      if (!_spinAnim) return;
      _spinAnim.playbackRate = _baseRate * 6;
      var t0 = null, peak = _baseRate * 6, dur = 1800;
      function ease(ts) {
        if (!t0) t0 = ts;
        var p = Math.min((ts - t0) / dur, 1);
        var e = 1 - Math.pow(1 - p, 2.5);
        _spinAnim.playbackRate = peak + (_baseRate - peak) * e;
        if (p < 1) requestAnimationFrame(ease);
      }
      requestAnimationFrame(ease);
    }

    function openDrawer() {
      document.getElementById('drawer').classList.add('open');
      document.getElementById('overlay').classList.add('open');
    }
    function closeDrawer() {
      document.getElementById('drawer').classList.remove('open');
      document.getElementById('overlay').classList.remove('open');
    }
    function toggleDrawer() {
      _spinBtn();
      if (document.getElementById('drawer').classList.contains('open')) {
        closeDrawer();
      } else {
        openDrawer();
      }
    }
    document.addEventListener('keydown', function (e) { if (e.key === 'Escape') closeDrawer(); });
  </script>

  <!-- Draggable cosmos button -->
  <script>
  (function () {
    var btn = document.querySelector('.menu-btn');
    if (!btn) return;
    var KEY = 'menuBtnPos';
    var dragging = false, _wasDrag = false;
    var startX, startY, startLeft, startTop;

    try {
      var saved = JSON.parse(localStorage.getItem(KEY));
      if (saved) {
        btn.style.right = 'auto'; btn.style.transform = 'none';
        btn.style.left = Math.min(saved.x, window.innerWidth  - btn.offsetWidth)  + 'px';
        btn.style.top  = Math.min(saved.y, window.innerHeight - btn.offsetHeight) + 'px';
      }
    } catch (e) {}

    function xy(e) { return e.touches ? [e.touches[0].clientX, e.touches[0].clientY] : [e.clientX, e.clientY]; }

    function onStart(e) {
      if (e.button !== undefined && e.button !== 0) return;
      var c = xy(e); startX = c[0]; startY = c[1];
      var r = btn.getBoundingClientRect(); startLeft = r.left; startTop = r.top;
      btn.style.right = 'auto'; btn.style.transform = 'none';
      btn.style.left = startLeft + 'px'; btn.style.top = startTop + 'px';
      dragging = true; _wasDrag = false;
      e.preventDefault();
    }
    function onMove(e) {
      if (!dragging) return;
      var c = xy(e), dx = c[0] - startX, dy = c[1] - startY;
      if (Math.abs(dx) > 4 || Math.abs(dy) > 4) _wasDrag = true;
      btn.style.left = Math.max(0, Math.min(window.innerWidth  - btn.offsetWidth,  startLeft + dx)) + 'px';
      btn.style.top  = Math.max(0, Math.min(window.innerHeight - btn.offsetHeight, startTop  + dy)) + 'px';
      if (_wasDrag) e.preventDefault();
    }
    function onEnd() {
      if (!dragging) return; dragging = false;
      if (_wasDrag) { try { localStorage.setItem(KEY, JSON.stringify({ x: parseFloat(btn.style.left), y: parseFloat(btn.style.top) })); } catch (e) {} }
    }

    btn.addEventListener('click', function (e) {
      if (_wasDrag) { _wasDrag = false; e.stopImmediatePropagation(); e.preventDefault(); }
    }, true);
    btn.addEventListener('mousedown', onStart);
    btn.addEventListener('touchstart', onStart, { passive: false });
    document.addEventListener('mousemove', onMove);
    document.addEventListener('touchmove', onMove, { passive: false });
    document.addEventListener('mouseup', onEnd);
    document.addEventListener('touchend', onEnd);
  }());
  </script>
